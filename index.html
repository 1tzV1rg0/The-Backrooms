<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Backrooms Maze</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game" aria-label="Backrooms maze game"></canvas>
  <div id="hud" aria-live="polite">
    <span id="coords">Player 0, 0 | Monster 0, 0</span>
    <span id="status">Find the exit</span>
    <button id="pause" type="button" aria-label="Pause game">Pause</button>
    <button id="restart" type="button" aria-label="Restart game">Restart</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
